                - heading "Understand the code" [level=2] [ref=e1139]
                - heading "Sample application" [level=3] [ref=e1140]
                - paragraph [ref=e1141]: "The Django sample app was created using standard Django tooling. The following commands create the project and the polls app:"
                - code [ref=e1144]: django-admin startproject mysite python manage.py startapp polls
                - paragraph [ref=e1145]:
                  - text: The base views, models, and route configurations were copied from
                  - link "Writing your first Django app" [ref=e1146] [cursor=pointer]:
                    - /url: https://docs.djangoproject.com/en/stable/#first-steps
                  - text: (
                  - link "Part 1" [ref=e1147] [cursor=pointer]:
                    - /url: https://docs.djangoproject.com/en/stable/intro/tutorial01/
                  - text: and
                  - link "Part 2" [ref=e1148] [cursor=pointer]:
                    - /url: https://docs.djangoproject.com/en/stable/intro/tutorial02/
                  - text: ).
                - heading "Secrets from Secret Manager" [level=3] [ref=e1149]
                - paragraph [ref=e1150]:
                  - text: The
                  - code [ref=e1151]: settings.py
                  - text: file contains code that uses the Secret Manager Python API to retrieve the latest version of the named secret, and pull it into the environment (using
                  - link "django-environ" [ref=e1152] [cursor=pointer]:
                    - /url: https://django-environ.readthedocs.io/
                    - code [ref=e1153]: django-environ
                  - text: "):"
                - paragraph
                - code [ref=e1157]: "# SECURITY WARNING: don't run with debug turned on in production! # Change this to \"False\" when you are ready for production env = environ.Env(DEBUG=(bool, True)) env_file = os.path.join(BASE_DIR, \".env\") # Attempt to load the Project ID into the environment, safely failing on error. try: _, os.environ[\"GOOGLE_CLOUD_PROJECT\"] = google.auth.default() except google.auth.exceptions.DefaultCredentialsError: pass if os.path.isfile(env_file): # Use a local secret file, if provided env.read_env(env_file) # ... elif os.environ.get(\"GOOGLE_CLOUD_PROJECT\", None): # Pull secrets from Secret Manager project_id = os.environ.get(\"GOOGLE_CLOUD_PROJECT\") client = secretmanager.SecretManagerServiceClient() settings_name = os.environ.get(\"SETTINGS_NAME\", \"django_settings\") name = f\"projects/{project_id}/secrets/{settings_name}/versions/latest\" payload = client.access_secret_version(name=name).payload.data.decode(\"UTF-8\") env.read_env(io.StringIO(payload)) else: raise Exception(\"No local .env or GOOGLE_CLOUD_PROJECT detected. No secrets found.\")"
                - paragraph
                - paragraph [ref=e1158]: The secret is used to store multiple secret values to reduce the number of different secrets that needed to be configured.
                - heading "CSRF configurations" [level=3] [ref=e1159]
                - paragraph [ref=e1160]:
                  - text: Django has built-in protection against
                  - link "Cross Site Request Forgery (CSRF)" [ref=e1161] [cursor=pointer]:
                    - /url: https://docs.djangoproject.com/en/stable/ref/csrf/#how-it-works
                  - text: . Starting in Django 4.0, changes to the way this works mean that it's important to tell Django what it's hosted URL is, so it can offer the best protections for users submitting data.
                - paragraph [ref=e1162]:
                  - text: You supply the app's URL as an environment variable in the
                  - code [ref=e1163]: settings.py
                  - text: file This is the value that Django uses for the relevant settings.
                - paragraph
                - code [ref=e1167]: "# SECURITY WARNING: It's recommended that you use this when # running in production. The URLs will be known once you first deploy # to Cloud Run. This code takes the URLs and converts it to both these settings formats. CLOUDRUN_SERVICE_URLS = env(\"CLOUDRUN_SERVICE_URLS\", default=None) if CLOUDRUN_SERVICE_URLS: CSRF_TRUSTED_ORIGINS = env(\"CLOUDRUN_SERVICE_URLS\").split(\",\") # Remove the scheme from URLs for ALLOWED_HOSTS ALLOWED_HOSTS = [urlparse(url).netloc for url in CSRF_TRUSTED_ORIGINS] SECURE_SSL_REDIRECT = True SECURE_PROXY_SSL_HEADER = (\"HTTP_X_FORWARDED_PROTO\", \"https\") else: ALLOWED_HOSTS = [\"*\"]"
                - heading "Local secret overrides" [level=3] [ref=e1168]
                - paragraph [ref=e1169]:
                  - text: If a
                  - code [ref=e1170]: .env
                  - text: file is found on the local filesystem, it is used instead of the value from Secret Manager. Creating a
                  - code [ref=e1171]: .env
                  - text: file locally can help with local testing (e.g. local development against a SQLite database, or other local settings).
                - heading "Database connection" [level=3] [ref=e1172]
                - paragraph [ref=e1173]:
                  - text: The
                  - code [ref=e1174]: settings.py
                  - text: file contains the configuration for your SQL database. It uses the
                  - code [ref=e1175]: env.db()
                  - text: helper from
                  - code [ref=e1176]: django-environ
                  - text: to load the connection string set in
                  - code [ref=e1177]: DATABASE_URL
                  - text: into the
                  - code [ref=e1178]: DATABASES
                  - text: setting.
                - paragraph [ref=e1179]:
                  - text: When running the application locally and using the Cloud SQL Auth Proxy to access the hosted database, the
                  - code [ref=e1180]: USE_CLOUD_SQL_AUTH_PROXY
                  - text: flag adjusts the database settings to use the proxy.
                - paragraph
                - code [ref=e1184]: "# Use django-environ to parse the connection string DATABASES = {\"default\": env.db()} # If the flag as been set, configure to use proxy if os.getenv(\"USE_CLOUD_SQL_AUTH_PROXY\", None): DATABASES[\"default\"][\"HOST\"] = \"127.0.0.1\" DATABASES[\"default\"][\"PORT\"] = 5432"
                - paragraph
                - heading "Cloud-stored static" [level=3] [ref=e1185]
                - paragraph [ref=e1186]:
                  - text: The
                  - code [ref=e1187]: settings.py
                  - text: file also uses
                  - link "django-storages" [ref=e1188] [cursor=pointer]:
                    - /url: https://django-storages.readthedocs.io/en/latest/backends/gcloud.html
                    - code [ref=e1189]: django-storages
                  - text: "to integrate the Cloud Storage media bucket directly into the project:"
                - paragraph
                - code [ref=e1193]: "# Define static storage via django-storages[google] GS_BUCKET_NAME = env(\"GS_BUCKET_NAME\") STATIC_URL = \"/static/\" STORAGES = { \"default\": { \"BACKEND\": \"storages.backends.gcloud.GoogleCloudStorage\", }, \"staticfiles\": { \"BACKEND\": \"storages.backends.gcloud.GoogleCloudStorage\", }, } GS_DEFAULT_ACL = \"publicRead\""
                - heading "Automation with Cloud Build" [level=3] [ref=e1194]
                - paragraph [ref=e1195]:
                  - text: The
                  - code [ref=e1196]: cloudmigrate.yaml
                  - text: handles all the steps required to create a new container image, and use it to apply database migrations.
                - paragraph [ref=e1197]:
                  - text: This tutorial opts to use buildpacks to build the container image, and
                  - link "custom entrypoints in the Procfile" [ref=e1198] [cursor=pointer]:
                    - /url: /docs/buildpacks/overview#use_to_containerize_your_code
                    - text: custom entrypoints in the
                    - code [ref=e1199]: Procfile
                  - text: to handle management commands. These can then be referenced by Cloud Run jobs to perform the commands.
                - code [ref=e1203]: "steps: - id: \"Build Container Image\" name: gcr.io/k8s-skaffold/pack args: [\"build\", \"${_IMAGE_NAME}\", \"--builder=gcr.io/buildpacks/builder\"] - id: \"Push Container Image\" name: \"gcr.io/cloud-builders/docker\" args: [\"push\", \"${_IMAGE_NAME}\"] - id: \"Migrate database\" name: \"gcr.io/google.com/cloudsdktool/cloud-sdk\" entrypoint: /bin/bash args: - \"-c\" - | gcloud run jobs create migrate-job \\ --region ${_REGION} \\ --image ${_IMAGE_NAME} \\ --set-cloudsql-instances ${_CLOUD_SQL_CONNECTION_NAME} \\ --set-env-vars SETTINGS_NAME=${_SECRET_SETTINGS_NAME} \\ --command migrate \\ --execute-now - id: \"Create superuser\" name: \"gcr.io/google.com/cloudsdktool/cloud-sdk\" entrypoint: /bin/bash args: - \"-c\" - | gcloud run jobs create superuser-job \\ --region ${_REGION} \\ --image ${_IMAGE_NAME} \\ --set-cloudsql-instances ${_CLOUD_SQL_CONNECTION_NAME} \\ --set-env-vars SETTINGS_NAME=${_SECRET_SETTINGS_NAME} \\ --set-env-vars DJANGO_SUPERUSER_EMAIL=${_ADMIN_EMAIL} \\ --set-secrets DJANGO_SUPERUSER_PASSWORD=${_ADMIN_PASSWORD_NAME}:latest \\ --command createsuperuser \\ --execute-now options: dynamicSubstitutions: true substitutions: _INSTANCE_NAME: django-instance _CLOUD_SQL_CONNECTION_NAME: ${PROJECT_ID}:${_REGION}:${_INSTANCE_NAME} _REGION: us-central1 _SERVICE_NAME: polls-service _SECRET_SETTINGS_NAME: django_settings _ARTIFACT_REGISTRY: cloud-run-source-deploy _IMAGE_NAME: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY}/${_SERVICE_NAME} _ADMIN_EMAIL: example@example.com _ADMIN_PASSWORD_NAME: superuser_password images: - \"${_IMAGE_NAME}\""
                - paragraph [ref=e1204]:
                  - link "Substitution variables" [ref=e1205] [cursor=pointer]:
                    - /url: /build/docs/configuring-builds/substitute-variable-values
                  - text: are used in this configuration.
                - heading "Superuser creation with Cloud Run Jobs" [level=3] [ref=e1206]
                - paragraph [ref=e1207]:
                  - text: The Django management command
                  - link "createsuperuser" [ref=e1208] [cursor=pointer]:
                    - /url: https://docs.djangoproject.com/en/stable/ref/django-admin/#createsuperuser
                    - code [ref=e1209]: createsuperuser
                  - text: can be run non-interactively by setting
                  - code [ref=e1210]: DJANGO_SUPERUSER_EMAIL
                  - text: and
                  - code [ref=e1211]: DJANGO_SUPERUSER_PASSWORD
                  - text: .
                - paragraph [ref=e1212]:
                  - text: This tutorial opts to use Cloud Run Jobs to run this command. This is done by adding a custom entry into the
                  - code [ref=e1213]: Procfile
                  - text: which runs
                  - code [ref=e1214]: createsuperuser
                  - text: .
                - code [ref=e1218]: "# Create superuser (requires DJANGO_SUPERUSER_PASSWORD and DJANGO_SUPERUSER_EMAIL envvars) createsuperuser: python manage.py createsuperuser --username admin --noinput || echo \"User already exists.\""
              - generic [ref=e1219]:
                - heading "Clean up" [level=2] [ref=e1220]
                - paragraph [ref=e1221]: To avoid incurring charges to your Google Cloud account for the resources used in this tutorial, either delete the project that contains the resources, or keep the project and delete the individual resources.
                - heading "Delete the project" [level=3] [ref=e1222]
                - list [ref=e1223]:
                  - complementary [ref=e1224]:
                    - text: error
                    - strong [ref=e1225]: Caution
                    - text: ": Deleting a project has the following effects:"
                    - list [ref=e1226]:
                      - listitem [ref=e1227]:
                        - strong [ref=e1228]: Everything in the project is deleted.
                        - text: If you used an existing project for the tasks in this document, when you delete it, you also delete any other work you've done in the project.
                      - listitem [ref=e1229]:
                        - strong [ref=e1230]: Custom project IDs are lost.
                        - text: When you created this project, you might have created a custom project ID that you want to use in the future. To preserve the URLs that use the project ID, such as an
                        - code [ref=e1231]: appspot.com
                        - text: URL, delete selected resources inside the project instead of deleting the whole project.
                    - paragraph [ref=e1232]: If you plan to explore multiple architectures, tutorials, or quickstarts, reusing projects can help you avoid exceeding project quota limits.
                  - listitem [ref=e1233]:
                    - text: In the Google Cloud console, go to the Manage resources page.
                    - paragraph [ref=e1234]:
                      - link "Go to Manage resources" [ref=e1235] [cursor=pointer]:
                        - /url: https://console.cloud.google.com/iam-admin/projects
                  - listitem [ref=e1236]: In the project list, select the project that you want to delete, and then click Delete.
                  - listitem [ref=e1237]: In the dialog, type the project ID, and then click Shut down to delete the project.
