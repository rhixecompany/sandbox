                - heading "Setting minimum permissions" [level=3] [ref=e1097]
                - paragraph [ref=e1098]:
                  - text: By default, this service is deployed with the
                  - link "default compute service account" [ref=e1099] [cursor=pointer]:
                    - /url: /compute/docs/access/service-accounts#default_service_account
                  - text: . However, in some cases, using the default service account can provide too many permissions. If you want to be more restrictive, you need to create your own service account and assign only the permissions that are required by your service. The permissions required can vary from service to service, depending on the resources used by a particular service.
                - paragraph [ref=e1100]: "The minimum project roles required by this service are the following:"
                - list [ref=e1101]:
