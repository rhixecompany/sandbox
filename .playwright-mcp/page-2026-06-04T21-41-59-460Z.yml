      - article [ref=e78]:
        - paragraph [ref=e79]:
          - text: CKEditor 4 is a popular WYSIWYG editor, widely used in websites, web frameworks, and content management systems (CMS) such as Drupal and Backdrop. According to its
          - link "website" [ref=e80] [cursor=pointer]:
            - /url: https://ckeditor.com/ckeditor-4/
          - text: ", the editor is “approved by millions, fully customizable, and the #1 rich text editor with the most features.” The Checkmarx Security Research Team discovered a stored cross-site scripting (XSS) vulnerability – assigned CVE-2021-33829 – that affects CKEditor 4 users in edit mode."
        - heading "Impact Summary" [level=2] [ref=e81]
        - paragraph [ref=e82]:
          - text: CKEditor 4 is commonly used and may affect a variety of environments, such as blogs, content management systems, and other websites that accept rich text content from users. Successful exploitation of the vulnerability leads to arbitrary web script injection. The impact depends on where the plugin is used. It may lead to account takeover, credential stealing, sensitive data exposure, etc.
          - text: When we found the vulnerability in CKEditor 4, we informed the maintainers. They didn’t initially consider our finding as a security issue, but released a new version with the fix (4.16.1). We continued our research and found that Drupal and django-ckeditor are vulnerable to XSS because of the issue we found. We informed both, and they pulled the CKEditor 4 version 4.16.1.
          - text: From here, we asked MITRE to issue a CVE because we strive to inform all CKEditor 4 dependents to get the CKEditor 4 latest version. Later on, CKEditor 4 realized the significance of our finding took the responsibility to issue CVE-2021-33829.
        - heading "CVSS Score" [level=2] [ref=e83]
        - paragraph [ref=e84]:
          - text: "CVSS: 3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N"
          - text: "Score: 6.1 (Medium)"
        - heading "Description" [level=2] [ref=e85]
        - paragraph [ref=e86]:
          - text: In June 2020,
          - link "CVE-2020-9281" [ref=e87] [cursor=pointer]:
            - /url: https://nvd.nist.gov/vuln/detail/CVE-2020-9281
          - text: was published due to a cross-site scripting CKEditor 4. The cause for this issue is in the HTML data processor that doesn’t sanitize a payload that contains the reserved ck_protected keyword.
          - text: The reserved “cke_protected” keyword is used internally by CKEditor 4 developers. It is an HTML comment that’s content is encoded. For simplicity, we’ll use the term ‘protected ‘comment’ in this blog.
          - text: The CKEditor 4 developers’
          - link "solution" [ref=e88] [cursor=pointer]:
            - /url: "#diff-4ec00c059a3ff2eacfa410e9bf58df799153ea84a6887d3daabcf7eb2c4931aa"
          - text: was to ensure there are no externally injected protected comments before parsing by removing instances of the protected comment. Since the keyword is only removed once, nesting the keyword yields the keyword (e.g., keykeywordword -> keyword). This allows an attacker to bypass this protection mechanism and exploit the XSS vulnerability, which was assumed to be fixed.
        - heading "Original Proof-of-Concept for CVE-2020-9281" [level=2] [ref=e89]:
          - text: Original Proof-of-Concept for
          - link "CVE-2020-9281" [ref=e90] [cursor=pointer]:
            - /url: https://nvd.nist.gov/vuln/detail/CVE-2020-9281
        - list [ref=e91]:
          - listitem [ref=e92]: Click the source button in CKEditor 4
          - listitem [ref=e93]: "Paste the following payload:"
        - paragraph [ref=e94]:
          - code [ref=e95]: "Xss<!--{cke_protected} --!><img src=1 onerror=alert(`XSS`)> -->Attack"
