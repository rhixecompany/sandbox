        - heading "Vulnerability Analysis" [level=2] [ref=e146]
        - paragraph [ref=e147]:
          - text: The htmldataprocessor’s
          - link "removeReserveKeywords" [ref=e148] [cursor=pointer]:
            - /url: https://github.com/ckeditor/ckeditor4/blob/17a1555f7fbb0e83f737c9efe27650dca8dff36f/core/htmldataprocessor.js#L969
          - text: function aims to ensure there are no externally injected protected comment keywords before parsing. However, it fails to remove instances of the protected comment recursively.
        - list [ref=e149]:
          - listitem [ref=e150]:
            - text: The
            - link "removeReserveKeywords" [ref=e151] [cursor=pointer]:
              - /url: https://github.com/ckeditor/ckeditor4/blob/17a1555f7fbb0e83f737c9efe27650dca8dff36f/core/htmldataprocessor.js#L969
            - text: removes instances of the protected comment keyword.
          - listitem [ref=e152]: The parse method splits to elements array what is left from the payload using a regular expression.
          - listitem [ref=e153]:
            - text: The
            - link "regular expression" [ref=e154] [cursor=pointer]:
              - /url: https://github.com/ckeditor/ckeditor4/blob/17a1555f7fbb0e83f737c9efe27650dca8dff36f/core/htmlparser.js#L18
            - text: identifies comments with the following structure
        - paragraph [ref=e155]:
          - code [ref=e156]: <!--Comment -->.
          - text: If the input contains a comment with an extra exclamation mark, like this
          - code [ref=e157]: <!--comment --!>,
          - text: the regular expression does not consider the – -!> suffix as a closing tag of the comment and treats the rest of the input as a comment until a proper closing suffix appears, like this “- ->”.
        - list [ref=e158]:
          - listitem [ref=e159]:
            - text: The third element of the array that resulted from the regular expression processing is a
            - link "comment" [ref=e160] [cursor=pointer]:
              - /url: https://github.com/ckeditor/ckeditor4/blob/17a1555f7fbb0e83f737c9efe27650dca8dff36f/core/htmlparser.js#L132
            - text: .
          - listitem [ref=e161]:
            - text: The
            - link "protectRealComments" [ref=e162] [cursor=pointer]:
              - /url: https://github.com/ckeditor/ckeditor4/blob/17a1555f7fbb0e83f737c9efe27650dca8dff36f/core/htmldataprocessor.js#L860
            - text: encodes the third element of the array if it considers it as a real comment. In a case of a nested protected comment, the
            - link "protectedRealComments" [ref=e163] [cursor=pointer]:
              - /url: https://github.com/ckeditor/ckeditor4/blob/17a1555f7fbb0e83f737c9efe27650dca8dff36f/core/htmldataprocessor.js#L860
            - text: input contains a protected comment. For that reason, the
            - link "protectedRealComments" [ref=e164] [cursor=pointer]:
              - /url: https://github.com/ckeditor/ckeditor4/blob/17a1555f7fbb0e83f737c9efe27650dca8dff36f/core/htmldataprocessor.js#L860
            - text: doesn’t encode it.
          - listitem [ref=e165]: "The browser identifies the suffix of the following input <- -comment – -!> as an error and mutates the input into proper html comment: <!- -comment – ->. The remainder of the payload stays out of the html comment unencoded."
        - paragraph [ref=e166]: "When the algorithm processes the new Proof-of-Concept, the following occurs:"
        - list [ref=e167]:
          - listitem [ref=e168]: An attacker injects this payload
        - paragraph [ref=e169]:
          - code [ref=e170]: "Xss<!--{cke_{cke_protected}protected}--!><img src=1 onerror=alert(`xss`)> -->Attack"
        - list [ref=e171]:
          - listitem [ref=e172]:
            - text: The
            - link "removeReserveKeywords" [ref=e173] [cursor=pointer]:
              - /url: https://github.com/ckeditor/ckeditor4/blob/17a1555f7fbb0e83f737c9efe27650dca8dff36f/core/htmldataprocessor.js#L969
            - text: "removes the {cke_protected} and what is left from the payload is:"
        - paragraph [ref=e174]:
          - code [ref=e175]: "Xss<!--{cke_protected}--!><img src=1 onerror=alert(`xss`)> -->Attack"
        - list [ref=e176]:
          - listitem [ref=e177]: Since –!> is not treated as a comment end tag , the CKEditor4 parse method considers the whole highlighted text as a protected comment
        - paragraph [ref=e178]:
          - code [ref=e179]: "Xss<!--{cke_protected}--!><img src=1 onerror=alert(`xss`)> -->Attack"
        - list [ref=e180]:
          - listitem [ref=e181]:
            - text: The
            - link "protectRealComments" [ref=e182] [cursor=pointer]:
              - /url: https://github.com/ckeditor/ckeditor4/blob/17a1555f7fbb0e83f737c9efe27650dca8dff36f/core/htmldataprocessor.js#L860
            - text: identifies the comment as protected comment and doesn’t encode its content.
          - listitem [ref=e183]: The browser mutates the payload, and the exclamation mark is removed. Because of that, the comment is closed, and the rest of the payload remains unsanitized, with the ineffectual closing comment at the end.
        - paragraph [ref=e184]:
          - code [ref=e185]: "Xss<!--{cke_protected}--><img src=1 onerror=alert(`xss`)> -->Attack"
        - list [ref=e186]:
          - listitem [ref=e187]: The browser runs the unsanitized img onerror event
        - heading "Recommendations:" [level=2] [ref=e188]
        - paragraph [ref=e189]:
          - text: The fix for this issue has been released, and it is highly recommended to update CKEditor 4 and Drupal to the latest available version. Regarding CKEditor, moving to CKEditor 5 is also an option.
          - text: While CKEditor 5 exists, CKEditor 4 is still maintained because they are not entirely alike. CKEditor 5 doesn’t have an out-of-the-box source button for freestyle HTML coding. It’s possible to achieve the source button functionality by developing a plugin or consuming a plugin of third parties.
        - heading "Timeline of Disclosure:" [level=2] [ref=e190]
        - paragraph [ref=e191]: April 28, 2021 – Disclosure to CKSource
        - paragraph [ref=e192]: May 18, 2021 – Disclosure to Drupal
        - paragraph [ref=e193]: May 20, 2021 – CKEditor4.16.1 release, mitigating the vulnerability
        - paragraph [ref=e194]:
          - text: May 26, 2021 – Drupal 9.2 release and
          - link "security advisory" [ref=e195] [cursor=pointer]:
            - /url: https://www.drupal.org/sa-core-2021-003
          - text: mitigating the vulnerability
        - paragraph [ref=e196]:
          - text: May 26, 2021 – Backdrop CMS (a fork of Drupal) 1.19.1 release and
          - link "security advisory" [ref=e197] [cursor=pointer]:
            - /url: https://backdropcms.org/security/backdrop-sa-core-2021-003
          - text: mitigating the vulnerability
        - paragraph [ref=e198]: May 29, 2021 – django-ckeditor 6.1.0 release, mitigating the vulnerability
        - paragraph [ref=e199]:
          - text: June 03, 2021 –
          - link "CVE-2021-33829" [ref=e200] [cursor=pointer]:
            - /url: https://nvd.nist.gov/vuln/detail/cve-2021-33829
          - text: assigned
        - paragraph [ref=e201]: June 14, 2021 – Public disclosure
        - heading "Conclusion" [level=2] [ref=e202]
        - paragraph [ref=e203]:
          - text: This type of activity is part of the Checkmarx Security Research Team’s ongoing efforts to protect the software supply chain. Once the Checkmarx Security Team reveals a vulnerability in a package or a component, we immediately inform and help the maintainers mitigate the vulnerability. We also warn CxSCA customers if they use the vulnerable solution. Once the maintainer releases a fix, Checkmarx customers are the first to know.
          - text: No matter how a code is secured, using third party components exposes websites, services, and other software solutions. Therefore, it’s extremely important to mitigate vulnerabilities in widely used components and protect the supply chain.
