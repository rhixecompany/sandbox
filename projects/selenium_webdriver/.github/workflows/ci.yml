name: CI
on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck 2>/dev/null || echo "No typecheck"
      - run: bun run lint 2>/dev/null || echo "No lint"
      - run: bun run build 2>/dev/null || echo "No build"
