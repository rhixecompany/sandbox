global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]
        labels:
          service: "traefik"

  - job_name: "banking-app"
    static_configs:
      - targets: ["app:3000"]
        labels:
          service: "banking-app"

  - job_name: "postgres"
    static_configs:
      - targets: ["db:5432"]
        labels:
          service: "postgres"

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
        labels:
          service: "redis"
