name: Docker Security & Optimization

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 0" # Weekly security scan

jobs:
  scan-dependencies:
    runs-on: ubuntu-latest
    name: Scan Dependencies with npm audit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: bun install --frozen-lockfile --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Check for high/critical vulnerabilities
        run: |
          VULN_COUNT=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical' || echo 0)
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "⚠️ Found $VULN_COUNT high/critical vulnerabilities"
            npm audit --json | jq '.vulnerabilities'
          fi

  build-and-scan:
    runs-on: ubuntu-latest
    name: Build Image & Scan with Trivy
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./compose/dev/node/Dockerfile
          target: production
          push: false
          load: true
          tags: banking:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: banking:scan
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: trivy

  analyze-image:
    runs-on: ubuntu-latest
    name: Analyze Image Size & Layers
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./compose/dev/node/Dockerfile
          target: production
          push: false
          load: true
          tags: banking:analyze
          cache-from: type=gha

      - name: Get image info
        run: |
          echo "## Docker Image Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Size" >> $GITHUB_STEP_SUMMARY
          docker images banking:analyze --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image History" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker history banking:analyze --no-trunc >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  dockerfile-lint:
    runs-on: ubuntu-latest
    name: Lint Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3
        with:
          dockerfile: ./compose/dev/node/Dockerfile
          failure-threshold: warning
