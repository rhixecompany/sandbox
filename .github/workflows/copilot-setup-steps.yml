name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: |
          if [ -f Bash/package.json ]; then
            cd Bash
            bun install --frozen-lockfile || bun install
          else
            echo "Bash/package.json not found; skipping install"
          fi
      - name: Run linter
        run: |
          if [ -f Bash/package.json ]; then
            cd Bash
            bun run lint:strict --if-present || bun run lint --if-present
          else
            echo "Bash/package.json not found; skipping lint"
          fi
      - name: Run typecheck
        run: |
          if [ -f Bash/package.json ]; then
            cd Bash
            bun run typecheck --if-present
          else
            echo "Bash/package.json not found; skipping typecheck"
          fi
